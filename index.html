<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Простой сайт</title>
    <!-- Подключаем шрифт Google Fonts для красоты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <!-- Font Awesome для иконок (необязательно, но красиво) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 450px;
            padding: 40px 35px;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #777;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 16px;
            transition: color 0.2s;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 1px solid #e1e1e1;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
            background-color: #fafafa;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background-color: #fff;
        }

        .input-group input:focus + i {
            color: #667eea;
        }

        .password-hint {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
            margin-left: 10px;
        }

        .terms {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 25px 0;
            font-size: 14px;
            color: #555;
        }

        .terms input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .terms a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0 15px;
            color: #aaa;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #eee;
        }

        .divider::before {
            margin-right: 15px;
        }

        .divider::after {
            margin-left: 15px;
        }

        .social-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .social-btn {
            flex: 1;
            background-color: #f5f5f5;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
            border: 1px solid transparent;
        }

        .social-btn i {
            font-size: 18px;
        }

        .social-btn.google:hover {
            background-color: #db4437;
            color: white;
            border-color: #db4437;
        }

        .social-btn.facebook:hover {
            background-color: #4267B2;
            color: white;
            border-color: #4267B2;
        }

        .social-btn.github:hover {
            background-color: #333;
            color: white;
            border-color: #333;
        }

        /* Сообщение об ошибке/успехе */
        #message {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
            color: #e74c3c; /* красный для ошибок, зеленый для успеха */
            transition: color 0.3s;
        }

        #message.success {
            color: #2ecc71;
        }

        /* Адаптивность */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Создать аккаунт</h1>
        <p class="subtitle">Присоединяйтесь к нам! Это быстро и просто.</p>

        <!-- Форма регистрации -->
        <form id="signupForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" name="username" placeholder="Имя пользователя" required>
            </div>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" name="email" placeholder="Электронная почта" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="Пароль" required>
            </div>
            <div class="password-hint">Минимум 6 символов</div>

            <div class="input-group">
                <i class="fas fa-check-circle"></i>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Подтвердите пароль" required>
            </div>

            <div class="terms">
                <input type="checkbox" id="agreeTerms" required>
                <label for="agreeTerms">Я принимаю <a href="#">Условия использования</a> и <a href="#">Политику конфиденциальности</a></label>
            </div>

            <button type="submit">Зарегистрироваться</button>
        </form>

        <div class="divider">или</div>

        <div class="social-buttons">
            <button class="social-btn google" id="googleSignup" aria-label="Зарегистрироваться через Google"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn facebook" id="facebookSignup" aria-label="Зарегистрироваться через Facebook"><i class="fab fa-facebook-f"></i> FB</button>
            <button class="social-btn github" id="githubSignup" aria-label="Зарегистрироваться через GitHub"><i class="fab fa-github"></i> Git</button>
        </div>

        <div class="login-link">
            Уже есть аккаунт? <a href="#">Войти</a>
        </div>

        <div id="message"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('signupForm');
            const messageDiv = document.getElementById('message');
            const passwordInput = document.getElementById('password');
            const confirmInput = document.getElementById('confirmPassword');
            const usernameInput = document.getElementById('username');
            const emailInput = document.getElementById('email');
            const agreeCheckbox = document.getElementById('agreeTerms');

            // Функция для отображения сообщения
            function showMessage(text, isSuccess = false) {
                messageDiv.textContent = text;
                if (isSuccess) {
                    messageDiv.classList.add('success');
                } else {
                    messageDiv.classList.remove('success');
                }

                // Автоматически скрыть сообщение через 5 секунд (кроме ошибок валидации при вводе)
                if (isSuccess) {
                    setTimeout(() => {
                        messageDiv.textContent = '';
                        messageDiv.classList.remove('success');
                    }, 5000);
                }
            }

            // Валидация формы при отправке
            form.addEventListener('submit', function(event) {
                event.preventDefault(); // Предотвращаем перезагрузку страницы

                // Получаем значения
                const username = usernameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value.trim();
                const confirmPassword = confirmInput.value.trim();
                const isAgreed = agreeCheckbox.checked;

                // Проверки
                if (username === '') {
                    showMessage('Пожалуйста, введите имя пользователя.');
                    usernameInput.focus();
                    return;
                }

                if (username.length < 3) {
                    showMessage('Имя пользователя должно содержать минимум 3 символа.');
                    usernameInput.focus();
                    return;
                }

                if (email === '') {
                    showMessage('Пожалуйста, введите email.');
                    emailInput.focus();
                    return;
                }

                // Простейшая проверка email
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(email)) {
                    showMessage('Введите корректный email адрес.');
                    emailInput.focus();
                    return;
                }

                if (password === '') {
                    showMessage('Пожалуйста, введите пароль.');
                    passwordInput.focus();
                    return;
                }

                if (password.length < 6) {
                    showMessage('Пароль должен содержать минимум 6 символов.');
                    passwordInput.focus();
                    return;
                }

                if (confirmPassword === '') {
                    showMessage('Пожалуйста, подтвердите пароль.');
                    confirmInput.focus();
                    return;
                }

                if (password !== confirmPassword) {
                    showMessage('Пароли не совпадают.');
                    confirmInput.focus();
                    return;
                }

                if (!isAgreed) {
                    showMessage('Необходимо согласиться с условиями использования.');
                    agreeCheckbox.focus();
                    return;
                }

                // Если всё ок — имитируем отправку данных на сервер
                showMessage('Отправка данных...', false);

                // Создаём объект с данными (можно отправить через fetch)
                const userData = {
                    username: username,
                    email: email,
                    password: password // В реальном проекте пароль нельзя хранить/передавать в открытом виде! Используйте хеширование на бэке.
                };

                console.log('Данные для регистрации:', userData);

                // Тут должен быть fetch запрос к бэкенду
                // Для демонстрации просто покажем успех через 1 секунду
                setTimeout(() => {
                    showMessage('Регистрация прошла успешно! (Демо)', true);
                    form.reset(); // Очистить форму
                }, 1000);

                // В реальном проекте вы бы делали так:
                /*
                fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showMessage('Регистрация успешна! Перенаправление...', true);
                        setTimeout(() => { window.location.href = '/welcome'; }, 2000);
                    } else {
                        showMessage('Ошибка: ' + data.message);
                    }
                })
                .catch(error => {
                    showMessage('Ошибка сети. Попробуйте позже.');
                });
                */
            });

            // Дополнительная проверка совпадения паролей при вводе
            confirmInput.addEventListener('input', function() {
                const password = passwordInput.value.trim();
                const confirm = confirmInput.value.trim();

                if (confirm !== '' && password !== confirm) {
                    // Не перебиваем основное сообщение, просто визуально подсветим (можно добавить класс)
                    confirmInput.style.borderColor = '#e74c3c';
                } else {
                    confirmInput.style.borderColor = ''; // вернуть как было
                }
            });

            passwordInput.addEventListener('input', function() {
                // Если пароль меняется, сбрасываем подсветку подтверждения
                confirmInput.style.borderColor = '';
            });

            // Заглушки для соц. кнопок (просто выводят сообщение)
            document.getElementById('googleSignup').addEventListener('click', () => {
                showMessage('Регистрация через Google (демо)', false);
            });
            document.getElementById('facebookSignup').addEventListener('click', () => {
                showMessage('Регистрация через Facebook (демо)', false);
            });
            document.getElementById('githubSignup').addEventListener('click', () => {
                showMessage('Регистрация через GitHub (демо)', false);
            });
        });
    </script>
</body>
</html>
