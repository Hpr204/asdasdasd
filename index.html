<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация на CS2 HUB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            text-align: center;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            font-size: 32px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ffd700;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #ffd700;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #1a1a2e;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s;
            margin-top: 10px;
        }
        button:hover {
            transform: scale(1.05);
        }
        .message {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            min-height: 20px;
        }
        .success {
            color: #2ecc71;
        }
        .error {
            color: #e74c3c;
        }
        .link-home {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
        }
        .link-home a {
            color: #ffd700;
            text-decoration: none;
            font-size: 15px;
            transition: opacity 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .link-home a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }
        .link-home i {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Регистрация на CS2 HUB</h1>
        
        <form id="registerForm">
            <div class="input-group">
                <label>Имя пользователя</label>
                <input type="text" id="username" required>
            </div>
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="password" required>
            </div>
            
            <button type="submit">Зарегистрироваться</button>
        </form>
        
        <div id="message" class="message"></div>
        
        <!-- ИСПРАВЛЕННАЯ ССЫЛКА НА ГЛАВНУЮ -->
        <div class="link-home">
            <a href="https://hpr204.github.io/-/#">
                <i class="fas fa-arrow-left"></i> Вернуться на главную страницу
            </a>
        </div>
    </div>

    <!-- Подключаем Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const messageDiv = document.getElementById('message');
            
            // Простая валидация
            if (username.length < 3) {
                messageDiv.innerHTML = '❌ Имя должно быть не меньше 3 символов';
                messageDiv.className = 'message error';
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                messageDiv.innerHTML = '❌ Введите корректный email';
                messageDiv.className = 'message error';
                return;
            }
            
            if (password.length < 6) {
                messageDiv.innerHTML = '❌ Пароль должен быть не меньше 6 символов';
                messageDiv.className = 'message error';
                return;
            }
            
            // Сохраняем в localStorage для демонстрации
            const users = JSON.parse(localStorage.getItem('cs2hub_users') || '[]');
            users.push({
                username: username,
                email: email,
                registeredAt: new Date().toLocaleString('ru-RU')
            });
            localStorage.setItem('cs2hub_users', JSON.stringify(users));
            
            messageDiv.innerHTML = '✅ Регистрация успешна! Теперь вы можете войти.';
            messageDiv.className = 'message success';
            
            // Очищаем форму
            this.reset();
            
            // Показываем последних зарегистрированных (для демо)
            console.log('Всего зарегистрировано:', users.length);
        });
    </script>
</body>
</html>
